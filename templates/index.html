<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import GLPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            background: #e9ecef;
            border-color: #0d6efd;
        }
        .table-container {
            margin-top: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">Import de fichiers GLPI</h1>
        
        <div class="card">
            <div class="card-body">
                <div id="drop-zone" class="drop-zone mb-3">
                    <p class="mb-0">Glissez votre fichier CSV ici ou</p>
                    <input type="file" id="file-input" class="d-none" accept=".csv">
                    <button class="btn btn-primary mt-2" onclick="document.getElementById('file-input').click()">
                        Sélectionner un fichier
                    </button>
                </div>
                
                <div id="file-info" class="d-none">
                    <p class="mb-2">Fichier sélectionné : <span id="file-name"></span></p>
                    <button class="btn btn-success" onclick="uploadFile()">Importer</button>
                </div>

                <div class="mt-3">
                    <button class="btn btn-danger" onclick="resetDatabase()">
                        Réinitialiser la base de données
                    </button>
                </div>
            </div>
        </div>

        <div id="alert-container" class="mt-3"></div>

        <div class="table-container">
            <h2 class="h4 mb-3">Liste des tickets importés</h2>
            <table id="tickets-table" class="table table-striped">
                <thead>
                    <tr>
                        <th>Numéro</th>
                        <th>Unité de traitement</th>
                        <th>Dispositif</th>
                        <th>Catégorie</th>
                        <th>Date d'ouverture</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let ticketsTable;
        
        $(document).ready(function() {
            // Initialisation de DataTables
            ticketsTable = $('#tickets-table').DataTable({
                processing: true,
                serverSide: true,
                ajax: {
                    url: '/tickets',
                    type: 'GET',
                    data: function(d) {
                        // Ajouter des paramètres supplémentaires si nécessaire
                        return d;
                    }
                },
                columns: [
                    { 
                        data: 'numero_ticket',
                        name: 'numero_ticket'
                    },
                    { 
                        data: 'unite_traitement',
                        name: 'unite_traitement'
                    },
                    { 
                        data: 'dispositif',
                        name: 'dispositif'
                    },
                    { 
                        data: 'categorie',
                        name: 'categorie'
                    },
                    { 
                        data: 'date_ouverture',
                        name: 'date_ouverture'
                    }
                ],
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/1.13.7/i18n/fr-FR.json'
                },
                order: [[4, 'desc']], // Tri par défaut sur la date d'ouverture
                pageLength: 10,
                stateSave: true,
                drawCallback: function() {
                    $('.dataTables_paginate a').addClass('btn btn-sm btn-outline-primary mx-1');
                },
                // Activer le tri sur toutes les colonnes
                ordering: true,
                orderMulti: false // Désactiver le tri multiple pour simplifier
            });
        });

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const alertContainer = document.getElementById('alert-container');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        // Handle dropped files
        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFiles, false);

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight(e) {
            dropZone.classList.add('dragover');
        }

        function unhighlight(e) {
            dropZone.classList.remove('dragover');
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles({ target: { files: files } });
        }

        function handleFiles(e) {
            const files = e.target.files;
            if (files.length > 0) {
                fileName.textContent = files[0].name;
                fileInfo.classList.remove('d-none');
            }
        }

        function showAlert(message, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            alertContainer.appendChild(alert);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showAlert('Veuillez sélectionner un fichier', 'danger');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Fichier importé avec succès');
                    fileInfo.classList.add('d-none');
                    fileInput.value = '';
                    // Rafraîchir la table après l'import
                    ticketsTable.ajax.reload();
                } else {
                    showAlert(result.error, 'danger');
                }
            } catch (error) {
                showAlert('Erreur lors de l\'importation du fichier', 'danger');
            }
        }

        async function resetDatabase() {
            if (!confirm('Êtes-vous sûr de vouloir supprimer toutes les données ? Cette action est irréversible.')) {
                return;
            }

            try {
                const response = await fetch('/reset_database', {
                    method: 'POST'
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Base de données réinitialisée avec succès');
                    // Rafraîchir la table
                    ticketsTable.ajax.reload();
                } else {
                    showAlert(result.error, 'danger');
                }
            } catch (error) {
                showAlert('Erreur lors de la réinitialisation de la base de données', 'danger');
            }
        }
    </script>
</body>
</html>
