services:
  - type: web
    name: crc-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm --filter @crc/db db:generate && pnpm --filter @crc/api build
    startCommand: pnpm --filter @crc/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: crc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BREVO_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app
      - key: CORS_ORIGIN
        value: https://your-vercel-app.vercel.app
